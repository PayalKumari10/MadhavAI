projects:
  madhavai:
    schemaPath: amplify/backend/api/madhavai/build/schema.graphql
    includes:
      - src/graphql/**/*.js
    excludes:
      - ./amplify/**
    extensions:
      amplify:
        codeGenTarget: javascript
        generatedFileName: ''
        docsFilePath: src/graphql
        region: ap-south-1
        apiId: null
extensions:
  amplify:
    version: 3
