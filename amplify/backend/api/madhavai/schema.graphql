type FarmerProfile @model {
  id: ID!

  # Basic Info
  fullName: String!

  # Location
  state: String!
  district: String!
  villageTown: String!
  pincode: String!

  # Farm Details
  farmSizeAcres: Float!
  soilType: SoilType!

  # Crops
  primaryCrops: [CropType!]!

  # Metadata
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

enum SoilType {
  LOAMY
  CLAY
  SANDY
  SILT
  RED
}

enum CropType {
  WHEAT
  RICE
  COTTON
  SUGARCANE
  MAIZE
  SOYBEAN
  PULSES
  VEGETABLES
}
